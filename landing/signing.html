<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Matager | Build Your Store</title>
    <link rel="icon" type="image/png" href="./assets/img/favico.png" />
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="./assets/css/output.css" />
    <link rel="stylesheet" href="./assets/css/keyframes.css" />
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;700&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <style>
        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            background-color: #050505;
            color: white;
            overflow: hidden;
        }

        /* Original Reveal Animations */
        @keyframes revealWord {
            0% {
                opacity: 0;
                transform: translateY(20px);
                filter: blur(5px);
            }

            100% {
                opacity: 1;
                transform: translateY(0);
                filter: blur(0);
            }
        }

        @keyframes zoomIn {
            0% {
                opacity: 0;
                transform: scale(0.95);
            }

            100% {
                opacity: 1;
                transform: scale(1);
            }
        }

        .reveal {
            opacity: 0;
        }

        .animate-up {
            animation: revealWord 0.6s cubic-bezier(0.2, 1, 0.3, 1) forwards;
        }

        .animate-zoom {
            animation: zoomIn 0.6s cubic-bezier(0.2, 1, 0.3, 1) forwards;
        }

        .glass-card {
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.08);
            transition: height 0.4s cubic-bezier(0.4, 0, 0.2, 1);
        }

        /* Option Cards (Shopify Style) */
        .option-card {
            background: rgba(255, 255, 255, 0.02);
            border: 1px solid rgba(255, 255, 255, 0.05);
            transition: all 0.2s ease;
            cursor: pointer;
        }

        .option-card:hover {
            border-color: rgba(255, 255, 255, 0.2);
            background: rgba(255, 255, 255, 0.04);
        }

        .option-card.selected {
            border-color: #fff;
            background: rgba(255, 255, 255, 0.08);
        }

        /* Step Dot logic */
        .dot-glow {
            background: white !important;
            shadow: 0 0 12px #fff;
            opacity: 1 !important;
        }
    </style>
    <script type="module">import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import {
            getAuth,
            createUserWithEmailAndPassword,
            updateProfile,
        } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";
        import {
            getDatabase,
            ref,
            set,
        } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyDss53pHibCpqo87_1bhoUHkf8Idnj-Fig",
            authDomain: "matager-f1f00.firebaseapp.com",
            databaseURL: "https://matager-f1f00-default-rtdb.firebaseio.com",
            projectId: "matager-f1f00",
            storageBucket: "matager-f1f00.appspot.com",
            messagingSenderId: "922824110897",
            appId: "1:922824110897:web:b7978665d22e2d652e7610",
            measurementId: "G-FWS29Z8GMT",
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getDatabase(app);

        // --- New: Helper Function to handle the Countdown & Overlay ---
        const startRedirectCountdown = (seconds) => {
            const overlay = document.getElementById("redirect-overlay");
            const card = document.getElementById("overlay-card");
            const timerDisplay = document.getElementById("countdown-timer");
            let timeLeft = seconds;

            // Show overlay with fade/scale animation
            overlay.classList.remove("hidden");
            setTimeout(() => {
                overlay.classList.add("opacity-100");
                card.classList.remove("scale-95");
                card.classList.add("scale-100");
            }, 50);

            const countdown = setInterval(() => {
                const mins = Math.floor(timeLeft / 60);
                const secs = timeLeft % 60;

                timerDisplay.textContent = `${mins}:${secs < 10 ? "0" : ""}${secs}`;

                if (timeLeft <= 0) {
                    clearInterval(countdown);
                    window.location.href =
                        "https://mataager.github.io/App/Client/Dashboard/index.html#dashboard";
                }
                timeLeft--;
            }, 1000);
        };

        window.settingEnvironment = async () => {
            const nextBtn = document.getElementById("next-btn");
            nextBtn.disabled = true;

            nextBtn.innerHTML = `
    Setting up your store
    <div class="loading-container">
        <span class="dot-bounce bg-slate-950"></span>
        <span class="dot-bounce bg-slate-950"></span>
        <span class="dot-bounce bg-slate-950"></span>
    </div>
    `;

            const minimumDelay = new Promise((resolve) => setTimeout(resolve, 5000));

            try {
                const [userCredential] = await Promise.all([
                    createUserWithEmailAndPassword(auth, formData.email, formData.password),
                    minimumDelay,
                ]);

                const user = userCredential.user;
                const uid = user.uid;

                await updateProfile(user, { displayName: "client" });

                const createdAt = new Date().toISOString();
                const expDate = new Date();
                expDate.setDate(expDate.getDate() + 3);

                const finalSchema = {
                    "store-info": {
                        adminInfo: {
                            Email: formData.email,
                            Uid: uid,
                            name: `${formData.firstName} ${formData.lastName}`,
                            role: "client",
                        },
                        billingInfo: {
                            initial_plan: {
                                planAutoRenew: "Waiting",
                                planDiscount: "Waiting",
                                planExpDate: expDate.toISOString(),
                                planPaymentMethod: "Waiting",
                                planCapability: formData.inventory,
                                planPrice: "Waiting",
                                planStartedAt: createdAt,
                                planStatus: "Waiting",
                                planSubType: formData.inventory,
                                planTotalPaid: "Waiting",
                                planfirsttime: "yes",
                            },
                        },
                        mainInfo: {
                            busFocus: {
                                busCategory: formData.focus,
                                busGen: "Waiting",
                                busDedicated: "Waiting",
                            },
                            locationInfo: {
                                city: "Waiting",
                                country: "Waiting",
                                district: "Waiting",
                                locationUrl: "Waiting",
                            },
                        },
                        structureInfo: {
                            Lightning: "on",
                            defDomain: `matager.com/dashboard/${uid}`,
                            endpoint: `/${uid}`,
                            busEmail: "Waiting",
                            busPhone: "Waiting",
                            plan: formData.inventory,
                            "store-name": formData.storeName,
                            themeName: "default",
                            themeId: "38297hdd-3",
                        },
                    },
                };

                await set(ref(db, "Stores/" + uid), finalSchema);

                // Update button state
                nextBtn.innerHTML = `Environment Ready! <i class="bi bi-check-circle-fill ms-2"></i>`;

                // Trigger the 5-minute countdown overlay
                setTimeout(() => {
                    startRedirectCountdown(300);
                }, 1000);
            } catch (error) {
                console.error("Setup Error:", error);
                alert("Setup Failed: " + error.message);
                nextBtn.disabled = false;
                nextBtn.innerHTML =
                    'Finish Setup <i class="bi bi-arrow-right-short ms-1"></i>';
            }
        };
    </script>
</head>

<body class="min-h-screen flex flex-col items-center justify-start pt-[50px] px-4">

    <div class="fixed inset-0 -z-10">
        <div class="absolute rounded-full -top-20 -left-20 w-[500px] h-[500px] bg-[#0ea5e9] blur-[120px] opacity-10">
        </div>
        <div
            class="absolute rounded-full top-1/2 left-1/2 -translate-x-1/2 -translate-y-1/2 w-[800px] h-[800px] bg-[#2563eb] blur-[160px] opacity-10">
        </div>
        <div
            class="absolute rounded-full -bottom-20 -right-20 w-[500px] h-[500px] bg-[#4f46e5] blur-[120px] opacity-10">
        </div>
    </div>

    <div id="redirect-overlay"
        class="fixed inset-0 z-[10000] hidden opacity-0 transition-opacity duration-700 flex items-center justify-center bg-black/60 backdrop-blur-xl">
        <div class="bg-[#111111]/90 p-10 rounded-[2rem] shadow-2xl border border-white/10 text-center max-w-md w-full mx-4 transform scale-95 transition-transform duration-700"
            id="overlay-card">

            <div class="mb-8 flex justify-center">
                <div class="w-16 h-16 border-2 border-white/20 border-t-white rounded-full animate-spin"></div>
            </div>

            <h2 class="text-3xl font-bold text-white mb-2">Environment Ready!</h2>
            <p class="text-gray-400 text-lg mb-6">
                You will be redirecting to your dashboard in
            </p>

            <div id="countdown-timer" class="text-6xl font-bold text-white mb-8 tabular-nums tracking-tighter">
                5:00
            </div>

            <button
                onclick="window.location.href='https://mataager.github.io/App/Client/Dashboard/index.html#dashboard'"
                class="w-full py-4 px-6 bg-white text-black font-semibold rounded-xl flex items-center justify-center gap-2 hover:bg-gray-200 transition-colors mb-8 redirectNow">
                Redirect Now <i class="bi bi-arrow-right-short"></i>
            </button>

            <div class="pt-6 border-t border-white/10 text-left space-y-3">
                <div class="flex gap-3 items-start">
                    <i class="bi bi-credit-card text-blue-400 mt-1"></i>
                    <p class="text-xs text-gray-400 leading-normal">
                        <span class="text-gray-200 font-medium block">Subscription Payment</span>
                        Complete your subscription directly from the platform after redirection.
                    </p>
                </div>
                <div class="flex gap-3 items-start">
                    <i class="bi bi-heart-fill text-rose-500 mt-1"></i>
                    <p class="text-xs text-gray-400 leading-normal">
                        <span class="text-gray-200 font-medium block">Giving Back</span>
                        3% of your subscription goes directly toward supporting local charity works.
                    </p>
                </div>
            </div>
        </div>
    </div>

    <img src="./assets/img/Logo.png" alt="logo" class="h-14 w-auto mb-5 opacity-90 animate-up">

    <div id="step-indicators" class="flex items-center gap-2 mb-5">
        <div class="dot animate-indicator" style="animation-delay: 100ms"></div>
        <div class="step-line w-8 h-[1px] animate-indicator" style="animation-delay: 150ms"></div>

        <div class="dot animate-indicator" style="animation-delay: 200ms"></div>
        <div class="step-line w-8 h-[1px] animate-indicator" style="animation-delay: 250ms"></div>

        <div class="dot animate-indicator" style="animation-delay: 300ms"></div>
        <div class="step-line w-8 h-[1px] animate-indicator" style="animation-delay: 350ms"></div>

        <div class="dot animate-indicator" style="animation-delay: 400ms"></div>
        <div class="step-line w-8 h-[1px] animate-indicator" style="animation-delay: 450ms"></div>

        <div class="dot animate-indicator" style="animation-delay: 500ms"></div>
        <div class="step-line w-8 h-[1px] animate-indicator" style="animation-delay: 550ms"></div>

        <div class="dot animate-indicator" style="animation-delay: 600ms"></div>
    </div>
    <div id="main-card" class="glass-card w-full max-w-[450px] p-10 rounded-[30px]  min-h-[380.5px]"
        style="animation-delay: 200ms">
        <div id="step-content" class="reveal animate-up [animation-delay:400ms] ">
        </div>

        <div id="action-bar" class="mt-8 flex items-center justify-between reveal animate-up [animation-delay:450ms]">
            <button id="back-btn" onclick="prevStep()"
                class="flex items-center text-sm text-white/30 hover:text-white transition-colors hidden">
                <i class="bi bi-arrow-left-short me-1"></i> Back
            </button>

            <button id="next-btn" onclick="nextStep()"
                class="flex items-center ml-auto bg-white text-black font-bold px-8 py-3 rounded-xl hover:bg-gray-100 transition-all active:scale-95">
                Continue <i class="bi bi-arrow-right-short text-xl ms-1"></i>
            </button>
        </div>

        <p id="toggle-area" class="text-center mt-6 text-sm text-white/30 reveal animate-up [animation-delay:500ms]">
            Already have an account?
            <button onclick="toggleSignIn()" class="text-white hover:text-blue-400 font-medium">Sign In</button>
        </p>
    </div>


    <script>
        let currentStep = 0;
        let isSignIn = false;
        let isResetting = false; // Track if we are in the "Forgot Password" view
        const formData = {};

        const steps = [
            {
                title: "Create Account",
                sub: "Enter your email to get started.",
                fields: ['email'],
                html: (data) => `<div class="space-y-4 animate-up">
                <label class="text-[11px] uppercase tracking-widest text-white/30 ml-1">Email Address</label>
                <input type="email" id="email" value="${data.email || ''}" placeholder="name@gmail.com" class="w-full px-4 py-4 bg-white/[0.03] border border-white/10 rounded-xl text-white outline-none focus:border-white/40 transition-all ">
            </div>`
            },
            {
                title: "Complete Signup",
                sub: "Set your password and name.",
                fields: ['firstName', 'lastName', 'password'],
                html: (data) => `<div class="space-y-4 animate-up">
                <div class="flex gap-2">
                    <input type="text" id="firstName" value="${data.firstName || ''}" placeholder="First Name" class="w-1/2 px-4 py-4 bg-white/[0.03] border border-white/10 rounded-xl text-white outline-none ">
                    <input type="text" id="lastName" value="${data.lastName || ''}" placeholder="Last Name" class="w-1/2 px-4 py-4 bg-white/[0.03] border border-white/10 rounded-xl text-white outline-none ">
                </div>
                <div class="relative group">
                    <input type="password" id="password" value="${data.password || ''}" placeholder="Create a password" class="w-full px-4 py-4 bg-white/[0.03] border border-white/10 rounded-xl text-white outline-none focus:border-white/40 transition-all">
                    <button type="button" onclick="togglePassword()" class="absolute right-4 top-1/2 -translate-y-1/2 text-white/30 hover:text-white/60 focus:outline-none"><i id="toggleIcon" class="bi bi-eye"></i></button>
                </div>
            </div>`
            },
            {
                title: "What’s your focus?",
                sub: "Choose the categories you plan to sell.",
                key: "focus",
                html: (data) => renderOptions([
                    { t: "Apparel & Accessories", s: "Clothing, shoes, watches, and jewelry." },
                    { t: "Home & Garden", s: "Décor, kitchenware, and furniture." },
                    { t: "Beauty & Wellness", s: "Organic skincare and personal care." },
                    { t: "Electronics & Gadgets", s: "High-tech devices and gear." }
                ], data.focus)
            },
            {
                title: "Sales channels",
                sub: "What is your current strategy?",
                key: "channels",
                html: (data) => renderOptions([
                    { t: "Hybrid Unified Store", s: "POS synced with your website.", i: "bi-globe text-4xl mr-2,bi-pc-display text-4xl" },
                    { t: "Online Store", s: "Sell through a custom website.", i: "bi-globe text-4xl" },
                    { t: "POS Setup", s: "POS cashier system only.", i: "bi-pc-display text-4xl" }
                ], data.channels, true)
            },
            {
                title: "Inventory Size",
                sub: "Choose the plan that fits your needs.",
                key: "inventory",
                html: (data) => renderOptions([
                    {
                        t: "1 - 5 item",
                        s: "Perfect for a boutique setup or single product launch.",
                        p: "50 EGP/mo",
                        id: "plan1" // Added ID
                    },
                    {
                        t: "5 - 20 item",
                        s: "Ideal for small collections and growing brands.",
                        p: "150 EGP/mo",
                        id: "plan2" // Added ID
                    },
                    {
                        t: "20 - 100 item",
                        s: "A comprehensive catalog for established shops.",
                        p: "250 EGP/mo",
                        id: "plan3" // Added ID
                    },
                    {
                        t: "100 - 300 item",
                        s: "High-volume inventory with multiple categories.",
                        p: "650 EGP/mo",
                        id: "plan4" // Added ID
                    },
                    {
                        t: "300 - 750 item",
                        s: "Large scale enterprise-level product management.",
                        p: "1200 EGP/mo",
                        id: "plan5" // Added ID
                    }
                ], data.inventory)
            },
            {
                title: "Store Name",
                sub: "What should we call your store?",
                fields: ['storeName'],
                html: (data) => `<div class="space-y-4 animate-up">
                <label class="text-[11px] uppercase tracking-widest text-white/30 ml-1">Store Name</label>
                <input type="text" id="storeName" value="${data.storeName || ''}" placeholder="My Awesome Store" class="w-full px-4 py-4 bg-white/[0.03] border border-white/10 rounded-xl text-white outline-none focus:border-white/40">
            </div>`
            }
        ];

        function renderOptions(opts, current, hasIcons = false) {
            return `<div class="grid grid-cols-1 categories-options gap-3 animate-up">
    ${opts.map(o => {
                const isSelected = current === o.t;
                return `
        <div class="option-card group relative overflow-hidden p-4 rounded-xl flex justify-between items-center cursor-pointer transition-all duration-300 ${isSelected ? 'selected' : ''}" 
            onclick="setChoice(this, '${o.t}', '${o.p || ''}', '${o.id || ''}')" style="height: 100px;">
            
            <div class="flex flex-col z-10">
                <div class="flex items-center gap-2">
                    <span class="text-white font-medium capitalize">${o.t}</span>
                    ${o.p ? `<span class="text-[10px] px-2 py-0.5 bg-white/10 rounded-full border border-white/10">${o.p}</span>` : ''}
                </div>
                <small class="text-white/50">${o.s}</small>
            </div>

            ${hasIcons && o.i ? `
            <div class="submerged-icon absolute -bottom-5 left-4 opacity-20 pointer-events-none transition-all duration-500 ease-in-out group-hover:-translate-y-2 flex gap-2">
                ${o.i.split(',').map(icon => `<i class="bi ${icon} text-4xl text-white"></i>`).join('')}
            </div>` : ''}

            <div class="check-box z-10 w-5 h-5 border border-white/20 rounded flex items-center justify-center transition-all duration-300">
                <i class="bi bi-check-lg ${isSelected ? '' : 'scale-0'} transition-transform duration-200 text-black"></i>
            </div>
        </div>`;
            }).join('')}
</div>`;
        }

        function saveCurrentData() {
            const step = steps[currentStep];
            if (step.fields) {
                step.fields.forEach(id => {
                    const el = document.getElementById(id);
                    if (el) formData[id] = el.value.trim();
                });
            }
        }

        function validateStep() {
            const step = steps[currentStep];
            if (step.fields) {
                for (let id of step.fields) {
                    const el = document.getElementById(id);
                    if (!el || !el.value.trim()) {
                        alert(`Please fill in all fields.`);
                        return false;
                    }
                }
            }
            if (step.key && !formData[step.key]) {
                alert(`Please select at least one option.`);
                return false;
            }
            return true;
        }

        function render() {
            const content = document.getElementById('step-content');
            const nextBtn = document.getElementById('next-btn');
            const data = steps[currentStep];

            content.innerHTML = `
                <h1 class="text-xl font-semibold tracking-tight mb-1 animate-up">${data.title}</h1>
                <p class="text-sm text-white/40 mb-8 animate-up">${data.sub}</p>
                ${data.html(formData)}
            `;

            // Ensure button has the correct onclick for Sign Up flow
            nextBtn.onclick = nextStep;
            nextBtn.innerHTML = (currentStep === steps.length - 1) ? 'Finish Setup' : 'Continue <i class="bi bi-arrow-right-short ms-1"></i>';

            updateIndicators();
        }

        // function setChoice(el, value) {
        //     const key = steps[currentStep].key;
        //     formData[key] = value;
        //     el.parentElement.querySelectorAll('.option-card').forEach(c => {
        //         c.classList.remove('selected');
        //         c.querySelector('.bi-check-lg').classList.add('scale-0');
        //     });
        //     el.classList.add('selected');
        //     el.querySelector('.bi-check-lg').classList.remove('scale-0');
        // }
        function setChoice(el, value, price = '', planId = '') {
            const step = steps[currentStep];
            const key = step.key;

            // Save the primary selection (e.g., "1 - 5 item")
            formData[key] = value;

            // If it's the inventory step, capture the extra details
            if (key === 'inventory') {
                formData.planPrice = price;
                formData.planId = planId;
            }

            // UI Feedback (Keeping your existing logic)
            el.parentElement.querySelectorAll('.option-card').forEach(c => {
                c.classList.remove('selected');
                const check = c.querySelector('.bi-check-lg');
                if (check) check.classList.add('scale-0');
            });
            el.classList.add('selected');
            el.querySelector('.bi-check-lg').classList.remove('scale-0');
        }

        function updateIndicators() {
            const indicators = document.getElementById('step-indicators');
            const dots = indicators.querySelectorAll('.dot');
            const lines = indicators.querySelectorAll('.step-line');
            const backBtn = document.getElementById('back-btn');
            const toggle = document.getElementById('toggle-area');

            // Handle visibility of the whole bar
            indicators.style.display = (isSignIn || isResetting) ? 'none' : 'flex';
            backBtn.style.display = (currentStep === 0 || isSignIn || isResetting) ? 'none' : 'block';
            toggle.style.display = (currentStep === 0 || isSignIn || isResetting) ? 'block' : 'none';

            // Update Dots
            dots.forEach((dot, i) => {
                if (i === currentStep) {
                    // Active Step: Large and Glowing
                    dot.className = "dot w-2.5 h-2.5 rounded-full bg-white shadow-[0_0_12px_#fff] transition-all duration-300";
                } else if (i < currentStep) {
                    // Past Steps: Slightly visible
                    dot.className = "dot w-1.5 h-1.5 rounded-full bg-white/60 transition-all duration-300";
                } else {
                    // Future Steps: Dimmed
                    dot.className = "dot w-1.5 h-1.5 rounded-full bg-white/20 transition-all duration-300";
                }
            });

            // Update Lines
            lines.forEach((line, i) => {
                // If the step after this line is reached, highlight the line
                if (i < currentStep) {
                    line.style.backgroundColor = "rgba(255, 255, 255, 0.4)";
                } else {
                    line.style.backgroundColor = "rgba(255, 255, 255, 0.1)";
                }
            });
        }

        function nextStep() {
            saveCurrentData();
            if (!validateStep()) return;

            if (currentStep < steps.length - 1) {
                currentStep++;
                render();
            } else {
                settingEnvironment();
                formData.created_at = new Date().toISOString();

                console.log("Final Data Captured:", formData);
                // Final submission logic here
            }
        }

        function prevStep() {
            saveCurrentData();
            if (currentStep > 0) {
                currentStep--;
                render();
            }
        }

        function togglePassword() {
            const input = document.getElementById('password');
            const icon = document.getElementById('toggleIcon');
            if (!input) return;
            const isPass = input.type === "password";
            input.type = isPass ? "text" : "password";
            icon.classList.replace(isPass ? 'bi-eye' : 'bi-eye-slash', isPass ? 'bi-eye-slash' : 'bi-eye');
        }

        // --- Authentication Flow Fixes ---

        function toggleSignIn() {
            isSignIn = !isSignIn;
            isResetting = false; // Reset the reset state if they toggle back
            const content = document.getElementById('step-content');
            const nextBtn = document.getElementById('next-btn');
            const toggleArea = document.getElementById('toggle-area');

            if (isSignIn) {
                content.innerHTML = `
                    <h1 class="text-xl font-semibold tracking-tight mb-1 animate-up">Welcome Back</h1>
                    <p class="text-sm text-white/40 mb-8 animate-up">Enter your credentials to access your store.</p>
                    <div class="space-y-4 animate-up">
                        <input type="email" id="loginEmail" placeholder="Email Address" class="w-full px-4 py-4 bg-white/[0.03] border border-white/10 rounded-xl text-white outline-none focus:border-white/30 transition-colors ">
                        <div class="space-y-2">
                            <input type="password" id="loginPass" placeholder="Password" class="w-full px-4 py-4 bg-white/[0.03] border border-white/10 rounded-xl text-white outline-none focus:border-white/30 transition-colors ">
                            <div class="flex justify-end px-1">
                                <button onclick="handleForgotPassword()" class="text-xs text-white/40 hover:text-white transition-colors">Forgot Password?</button>
                            </div>
                        </div>
                    </div>`;

                // Re-bind button for Login only
                nextBtn.innerHTML = 'Sign In <i class="bi bi-door-open ms-2"></i>';
                nextBtn.onclick = handleSignIn;

                toggleArea.innerHTML = `Don't have an account? <button onclick="toggleSignIn()" class="text-white hover:text-blue-400 font-medium">Sign Up</button>`;
            } else {
                currentStep = 0;
                toggleArea.innerHTML = `Already have an account? <button onclick="toggleSignIn()" class="text-white hover:text-blue-400 font-medium">Sign In</button>`;
                render();
            }
            updateIndicators();
        }

        function handleSignIn() {
            const email = document.getElementById('loginEmail').value;
            const pass = document.getElementById('loginPass').value;
            if (!email || !pass) {
                alert("Please enter both email and password.");
                return;
            }
            console.log("Logging in with:", email, pass);
            // Your login fetch logic here
        }

        function handleForgotPassword() {
            isResetting = true;
            const content = document.getElementById('step-content');
            const nextBtn = document.getElementById('next-btn');
            const toggleArea = document.getElementById('toggle-area');

            content.innerHTML = `
                <div class="animate-up">
                    <h1 class="text-xl font-semibold tracking-tight mb-1">Reset Password</h1>
                    <p class="text-sm text-white/40 mb-8">Enter your email and we'll send you a retrieval link.</p>
                    <div class="space-y-4">
                        <label class="text-[11px] uppercase tracking-widest text-white/30 ml-1">Email Address</label>
                        <input type="email" id="resetEmail" placeholder="name@gmail.com" class="w-full px-4 py-4 bg-white/[0.03] border border-white/10 rounded-xl text-white outline-none focus:border-white/40 transition-all">
                    </div>
                    <div id="status-message" class="mt-4 text-sm hidden"></div>
                </div>`;

            nextBtn.innerHTML = `Send Retrieval Link <i class="bi bi-mailbox ms-2"></i>`;
            nextBtn.onclick = () => sendResetLink();

            toggleArea.innerHTML = `Remembered your password? <button onclick="toggleSignIn()" class="text-white hover:text-blue-400 font-medium">Sign In</button>`;
            updateIndicators();
        }

        function sendResetLink() {
            const emailInput = document.getElementById('resetEmail');
            const statusMsg = document.getElementById('status-message');
            const nextBtn = document.getElementById('next-btn');
            const email = emailInput.value.trim();

            if (!email || !email.includes('@')) {
                statusMsg.innerText = "Please enter a valid email address.";
                statusMsg.className = "mt-4 text-sm text-red-400 animate-up";
                statusMsg.classList.remove('hidden');
                return;
            }

            nextBtn.innerText = "Sending...";
            nextBtn.disabled = true;

            setTimeout(() => {
                const gmailUrl = "https://mail.google.com/mail/u/0/#search/from%3AMatager+reset";
                statusMsg.innerHTML = `
                    <div class="flex items-start gap-3 p-4 bg-emerald-500/10 border border-emerald-500/20 rounded-2xl animate-up">
                        <i class="bi bi-check-circle-fill text-emerald-400 mt-1"></i>
                        <div class="space-y-2">
                            <p class="text-emerald-400 font-bold text-sm">Reset Link Sent!</p>
                            <p class="text-white/60 text-xs leading-relaxed">Recovery link sent to <span class="text-white font-medium">${email}</span>.</p>
                            <a href="${gmailUrl}" target="_blank" class="inline-flex items-center gap-2 text-[11px] font-bold text-emerald-400 hover:text-emerald-300 uppercase tracking-wider">Open Gmail Inbox <i class="bi bi-box-arrow-up-right"></i></a>
                        </div>
                    </div>`;
                statusMsg.classList.remove('hidden');
                nextBtn.innerText = "Resend Link";
                nextBtn.disabled = false;
            }, 1200);
        }

        render();
    </script>
